<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoIntercept AI — AI Sustainability Layer for Online Shopping</title>
    <script>
      // Gracefully prevent unhandled HMR WebSocket connection issues from showing up as app-level crashes/warnings
      const OriginalWebSocket = window.WebSocket;
      window.WebSocket = function(url, protocols) {
        if (url && (url.includes('vite') || url.includes('localhost') || url.includes('wss://'))) {
          // Return a dummy WebSocket to satisfy Vite client without throwing
          return {
            addEventListener: function() {},
            removeEventListener: function() {},
            send: function() {},
            close: function() {},
            readyState: 1,
            OPEN: 1,
            CONNECTING: 0,
            CLOSING: 2,
            CLOSED: 3
          };
        }
        return new OriginalWebSocket(url, protocols);
      };
      window.WebSocket.prototype = OriginalWebSocket.prototype;
      window.WebSocket.OPEN = OriginalWebSocket.OPEN;
      window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
      window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
      window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;

      window.addEventListener('unhandledrejection', function(event) {
        const r = event.reason;
        if (r && (r.message?.includes('WebSocket') || r.message?.includes('vite') || String(r).includes('WebSocket') || String(r).includes('vite'))) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);
      window.addEventListener('error', function(event) {
        const m = event.message;
        if (m && (m.includes('WebSocket') || m.includes('vite'))) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);
      const originalConsoleError = console.error;
      console.error = function(...args) {
        if (args.length > 0 && typeof args[0] === 'string' && (args[0].includes('WebSocket') || args[0].includes('[vite] failed to connect') || args[0].includes('WebSocket closed without opened'))) {
          return;
        }
        originalConsoleError.apply(console, args);
      };
      
      const originalConsoleWarn = console.warn;
      console.warn = function(...args) {
        if (args.length > 0 && typeof args[0] === 'string' && (args[0].includes('WebSocket') || args[0].includes('[vite] failed to connect'))) {
          return;
        }
        originalConsoleWarn.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
